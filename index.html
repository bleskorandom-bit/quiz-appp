<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Pro Ultra</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
    <div class="grid"></div>
    <div class="particles"></div>
  </div>

  <main class="app">
    <section class="screen active fade-up" id="startScreen">
      <div class="glass hero-card">
        <div class="top-badge">SUPER QUIZ SITE</div>
        <h1>Axborot texnologiyalari testi</h1>
        <p class="subtitle">
          Premium animatsiya, progress bar, timer, score va final result bilan.
        </p>

        <div class="hero-stats">
          <div class="mini-card">
            <span>Savollar</span>
            <strong>10 ta</strong>
          </div>
          <div class="mini-card">
            <span>Vaqt</span>
            <strong>15 sek</strong>
          </div>
          <div class="mini-card">
            <span>Rejim</span>
            <strong>Pro</strong>
          </div>
        </div>

        <button class="primary-btn glow-btn" id="startBtn">Boshlash</button>
      </div>
    </section>

    <section class="screen" id="quizScreen">
      <div class="glass quiz-card">
        <div class="quiz-top">
          <div class="pill" id="questionCount">1 / 10</div>
          <div class="timer-wrap">
            <span>Vaqt</span>
            <div class="timer" id="timer">15</div>
          </div>
        </div>

        <div class="progress-wrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <h2 class="question fade-switch" id="questionText">Savol</h2>

        <div class="answers" id="answersBox"></div>

        <div class="bottom-row">
          <div class="live-score">Ball: <span id="liveScore">0</span></div>
          <button class="secondary-btn" id="nextBtn" disabled>Keyingi</button>
        </div>
      </div>
    </section>

    <section class="screen" id="resultScreen">
      <div class="glass result-card pop-in">
        <div class="result-ring">
          <div class="result-ring-inner">
            <span id="finalPercent">0%</span>
          </div>
        </div>

        <h2 id="resultTitle">Natija</h2>
        <p class="result-text" id="resultText">Sening natijang shu yerda chiqadi.</p>

        <div class="result-stats">
          <div class="mini-card">
            <span>To‘g‘ri</span>
            <strong id="correctCount">0</strong>
          </div>
          <div class="mini-card">
            <span>Jami</span>
            <strong id="totalCount">10</strong>
          </div>
          <div class="mini-card">
            <span>Daraja</span>
            <strong id="levelText">Beginner</strong>
          </div>
        </div>

        <div class="result-actions">
          <button class="primary-btn glow-btn" id="restartBtn">Qayta boshlash</button>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
