<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Quiz App</title>
<style>
body { font-family: Arial; background:#0f0f0f; color:white; text-align:center; }
.container { margin:40px auto; max-width:400px; }
button {
  display:block; width:100%;
  margin:8px 0; padding:12px;
  background:#1e1e1e; color:white;
  border:1px solid #444; cursor:pointer;
}
button:hover { background:#333; }
.correct { color:#00ff88; }
.wrong { color:#ff4d4d; }
</style>
</head>
<body>

<div class="container">
<h2 id="question"></h2>
<div id="answers"></div>
<p id="result"></p>
<p id="score"></p>
<button onclick="nextQuestion()">Next</button>
</div>

<script>

const quiz = [
{q:"OT interfeys?",a:["Panel","Taskbar","Ish stoli","My computer"],c:2},
{q:"Raqamli axborot?",a:["Analog","Diskret","Subyektiv","Obyektiv"],c:1},
{q:"Kompyuter yuragi?",a:["RAM","HDD","CPU","Monitor"],c:2},
{q:"Vaqtincha xotira?",a:["HDD","ROM","RAM","DVD"],c:2},
{q:"Drayver?",a:["O‘yin","Xizmat dasturi","Virus","Fayl"],c:1},
{q:"Kiritish qurilmasi?",a:["Printer","Monitor","Klaviatura","Speaker"],c:2},
{q:"Asosiy saqlash?",a:["CPU","HDD","RAM","GPU"],c:1},
{q:"Elektron hujjat?",a:["Matn","Audio","Elektron","Rasm"],c:2},
{q:"Axborot nima?",a:["Internet","Ma’lumot","Video","Rasm"],c:1},
{q:"Texnologiya?",a:["San’at","Usullar","O‘yin","Internet"],c:1},

// 40 ta qo‘shimcha savol
{q:"CPU nima?",a:["Xotira","Protsessor","Disk","Monitor"],c:1},
{q:"RAM nima?",a:["Disk","Tezkor xotira","Printer","Video"],c:1},
{q:"HDD nima?",a:["Protsessor","Disk","Monitor","RAM"],c:1},
{q:"Printer nima?",a:["Kiritish","Chiqarish","Xotira","CPU"],c:1},
{q:"Scanner nima?",a:["Chiqarish","Kiritish","Disk","RAM"],c:1},
{q:"Monitor nima?",a:["Kiritish","Chiqarish","CPU","Disk"],c:1},
{q:"USB nima?",a:["Port","CPU","RAM","Disk"],c:0},
{q:"Modem nima?",a:["Internet qurilma","Disk","CPU","RAM"],c:0},
{q:"WiFi nima?",a:["Internet","Disk","RAM","CPU"],c:0},
{q:"Bluetooth nima?",a:["Aloqa","Disk","CPU","RAM"],c:0},

{q:"Server nima?",a:["Kompyuter","Telefon","Printer","Monitor"],c:0},
{q:"Notebook?",a:["Laptop","Printer","Disk","CPU"],c:0},
{q:"Planshet?",a:["Mobil qurilma","Printer","Disk","CPU"],c:0},
{q:"Smartfon?",a:["Telefon","Disk","CPU","RAM"],c:0},
{q:"OS nima?",a:["Tizim","O‘yin","Disk","CPU"],c:0},

{q:"Windows?",a:["OS","O‘yin","Disk","CPU"],c:0},
{q:"Linux?",a:["OS","Disk","CPU","RAM"],c:0},
{q:"Android?",a:["OS","Disk","CPU","RAM"],c:0},
{q:"iOS?",a:["OS","Disk","CPU","RAM"],c:0},
{q:"BIOS?",a:["Tizim","Disk","CPU","RAM"],c:0},

{q:"GPU?",a:["Grafika","Disk","CPU","RAM"],c:0},
{q:"LAN?",a:["Tarmoq","Disk","CPU","RAM"],c:0},
{q:"WAN?",a:["Tarmoq","Disk","CPU","RAM"],c:0},
{q:"HTML?",a:["Til","Disk","CPU","RAM"],c:0},
{q:"CSS?",a:["Dizayn","Disk","CPU","RAM"],c:0},

{q:"JS?",a:["Kod","Disk","CPU","RAM"],c:0},
{q:"Email?",a:["Xat","Disk","CPU","RAM"],c:0},
{q:"Browser?",a:["Dastur","Disk","CPU","RAM"],c:0},
{q:"Google?",a:["Qidiruv","Disk","CPU","RAM"],c:0},
{q:"YouTube?",a:["Video","Disk","CPU","RAM"],c:0},

{q:"PDF?",a:["Format","Disk","CPU","RAM"],c:0},
{q:"DOC?",a:["Format","Disk","CPU","RAM"],c:0},
{q:"Excel?",a:["Dastur","Disk","CPU","RAM"],c:0},
{q:"PowerPoint?",a:["Dastur","Disk","CPU","RAM"],c:0},
{q:"Antivirus?",a:["Himoya","Disk","CPU","RAM"],c:0},

{q:"Virus?",a:["Xavf","Disk","CPU","RAM"],c:0},
{q:"Cloud?",a:["Saqlash","Disk","CPU","RAM"],c:0},
{q:"Database?",a:["Ma’lumot","Disk","CPU","RAM"],c:0},
{q:"AI?",a:["Sun’iy intellekt","Disk","CPU","RAM"],c:0},
{q:"Robot?",a:["Mashina","Disk","CPU","RAM"],c:0}
];

let current = 0;
let score = 0;

function loadQuestion(){
let q = quiz[current];
document.getElementById("question").innerText = `${current+1}/50: ` + q.q;

let html="";
q.a.forEach((ans,i)=>{
html += `<button onclick="check(${i})">${ans}</button>`;
});
document.getElementById("answers").innerHTML = html;
document.getElementById("result").innerHTML="";
}

function check(i){
let correct = quiz[current].c;
if(i===correct){
score++;
document.getElementById("result").innerHTML="<span class='correct'>To‘g‘ri ✅</span>";
}else{
document.getElementById("result").innerHTML="<span class='wrong'>Noto‘g‘ri ❌</span>";
}
document.getElementById("score").innerText="Score: "+score;
}

function nextQuestion(){
current++;
if(current>=quiz.length){
document.getElementById("question").innerText="Tugatding 🎉";
document.getElementById("answers").innerHTML="";
document.getElementById("result").innerHTML="Final Score: "+score+"/50";
}else{
loadQuestion();
}
}

loadQuestion();

</script>

</body>
</html>
